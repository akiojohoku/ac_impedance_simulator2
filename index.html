<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交流回路インピーダンス・シミュレーター</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f6f8fb; --line:#dde3ec; --ink:#1a2433; --sub:#5b6879;
    --vV:#1864ab;   /* 電源電圧 V */
    --vAB:#3b82f6;  /* V_ab */
    --vBC:#0c8599;  /* V_bc */
    --iT:#e03131;   /* 全体電流 I */
    --iA:#f76707;   /* 分岐電流1 */
    --iB:#e8b100;   /* 分岐電流2 */
    --phi:#7048e8;  /* 位相角 */
    --mark:#2f9e44; /* 現在ωマーカー */
    --w0:#868e96;   /* ω0 線 */
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Yu Gothic",Meiryo,sans-serif;
    overflow:hidden; font-size:14px;
  }
  header{
    height:52px; display:flex; align-items:center; gap:16px;
    padding:0 16px; border-bottom:2px solid var(--line); background:#fff;
  }
  header h1{font-size:17px; font-weight:700; letter-spacing:.02em; white-space:nowrap;}
  .tabs{display:flex; gap:6px; flex-wrap:nowrap;}
  .tab{
    border:1.5px solid var(--line); background:#fff; color:var(--sub);
    border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .tab:hover{border-color:#9db2cc;}
  .tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .tab:focus-visible,.slider:focus-visible{outline:3px solid #74c0fc; outline-offset:2px;}

  main{
    height:calc(100% - 52px);
    display:grid;
    grid-template-columns:minmax(255px,300px) minmax(0,1fr) minmax(300px,380px);
    gap:10px; padding:10px;
  }
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; display:flex; flex-direction:column; min-height:0; min-width:0;
  }
  .panel h2{font-size:12.5px; font-weight:700; color:var(--sub); letter-spacing:.06em; margin-bottom:4px;}

  /* ---- 左：回路図・スライダー ---- */
  #circuitBox{flex:0 0 auto; background:#fff; border:1px solid var(--line); border-radius:8px;}
  #circuitBox svg{width:100%; height:auto; display:block;}
  .sliders{margin-top:8px; display:flex; flex-direction:column; gap:6px; flex:1 1 auto; justify-content:space-evenly;}
  .srow label{display:flex; justify-content:space-between; font-size:13px; font-weight:600;}
  .srow label .val{font-variant-numeric:tabular-nums; color:var(--ink);}
  .slider{width:100%; accent-color:#1864ab; height:22px; cursor:pointer;}
  .reactance{
    margin-top:6px; padding:7px 9px; background:#fff; border:1px solid var(--line); border-radius:8px;
    font-size:12.5px; color:var(--sub); display:flex; justify-content:space-between;
    flex-wrap:wrap; gap:2px 10px;
    font-variant-numeric:tabular-nums;
  }
  .reactance span{white-space:nowrap;}

  /* ---- 中央：ベクトル図 ---- */
  #vecPanel{align-items:stretch;}
  #vecWrap{flex:1 1 auto; min-height:0; background:#fff; border:1px solid var(--line); border-radius:8px; position:relative;}
  #vecWrap svg{position:absolute; inset:0; width:100%; height:100%;}
  #legend{
    margin-top:8px; display:grid; grid-template-columns:repeat(3,1fr); gap:4px 10px;
    font-size:12.5px; font-variant-numeric:tabular-nums;
  }
  .chip{display:flex; align-items:center; gap:6px; white-space:nowrap;}
  .chip .sw{width:14px; height:4px; border-radius:2px; flex:0 0 auto;}
  .basisNote{margin-top:5px; font-size:11.5px; color:var(--sub);}

  /* ---- 右：数値＋共振カーブ ---- */
  .readouts{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
  .readout{background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 10px;}
  .readout .k{font-size:12px; color:var(--sub); font-weight:700;}
  .readout .v{font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.25;}
  .readout .s{font-size:11.5px; color:var(--sub);}
  #curveWrap{flex:1 1 auto; min-height:0; background:#fff; border:1px solid var(--line); border-radius:8px; position:relative;}
  #curveWrap svg{position:absolute; inset:0; width:100%; height:100%;}

  /* ---- インピーダンスの式表示 ---- */
  .formula{
    background:#fff; border:1px solid var(--line); border-radius:8px;
    padding:7px 10px; margin-bottom:8px; font-size:13.5px; overflow-x:auto; white-space:nowrap;
  }
  .formula .fk{font-size:11.5px; color:var(--sub); font-weight:700; display:block; margin-bottom:3px;}
  .formula .fline{margin-top:4px;}
  .formula .fline:first-of-type{margin-top:0;}
  .formula i{font-family:Georgia,"Times New Roman",serif;}
  .fr{display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 3px;}
  .fr .nu{border-bottom:1.4px solid var(--ink); padding:0 5px 1px;}
  .fr .de{padding:1px 5px 0;}
  .sq{white-space:nowrap;}
  .sq .ov{border-top:1.4px solid var(--ink); padding:0 2px;}

  /* ---- 狭い画面（スマホ）では縦積み・スクロール可 ---- */
  @media (max-width:940px){
    body{overflow:auto;}
    header{height:auto; flex-wrap:wrap; padding:8px 12px; gap:8px;}
    main{height:auto; grid-template-columns:1fr;}
    #vecWrap{min-height:340px;}
    #curveWrap{min-height:260px;}
  }
</style>
</head>
<body>

<header>
  <h1>交流回路インピーダンス・シミュレーター</h1>
  <div class="tabs" role="tablist">
    <button class="tab active" id="tab1" role="tab" aria-selected="true">回路① R＋(C∥L)</button>
    <button class="tab" id="tab2" role="tab" aria-selected="false">回路② C＋(R∥L)</button>
    <button class="tab" id="tab3" role="tab" aria-selected="false">回路③ L＋(R∥C)</button>
  </div>
</header>

<main>
  <!-- 左パネル -->
  <section class="panel">
    <h2>回路図</h2>
    <div id="circuitBox"></div>
    <div class="sliders">
      <div class="srow">
        <label>抵抗 R <span class="val" id="valR"></span></label>
        <input class="slider" type="range" id="sR" min="0" max="200" step="1" value="50">
      </div>
      <div class="srow">
        <label>自己インダクタンス L <span class="val" id="valL"></span></label>
        <input class="slider" type="range" id="sL" min="0" max="0.50" step="0.01" value="0.10">
      </div>
      <div class="srow">
        <label>電気容量 C <span class="val" id="valC"></span></label>
        <input class="slider" type="range" id="sC" min="0" max="100" step="1" value="10">
      </div>
      <div class="srow">
        <label>角周波数 ω <span class="val" id="valW"></span></label>
        <input class="slider" type="range" id="sW" min="0" max="5000" step="10" value="1500">
      </div>
      <div class="reactance">
        <span>ωL = <span id="valXL"></span></span>
        <span>1/(ωC) = <span id="valXC"></span></span>
      </div>
      <div class="reactance" style="background:#fffbe6; border-color:#ffe58f;">
        <span>共振角周波数 ω₀ = 1/√(LC)</span>
        <span><b id="valW0"></b></span>
      </div>
    </div>
  </section>

  <!-- 中央パネル：ベクトル図 -->
  <section class="panel" id="vecPanel">
    <h2>ベクトル図（フェーザ図）</h2>
    <div id="vecWrap"><svg id="vecSvg" viewBox="0 0 640 560" preserveAspectRatio="xMidYMid meet" aria-label="電圧と電流のベクトル図"></svg></div>
    <div id="legend"></div>
    <div class="basisNote">基準軸（＋x 方向）：並列部分の電圧 <b>V<sub>bc</sub></b>。破線はベクトルの合成（平行四辺形）。ベクトルの長さは実際の大きさに比例（左下のスケールバー参照）。同位相のベクトルが重なるときは、見やすさのため電流・電圧の縮尺を自動調整します（スケールバーに反映）。電源電圧の振幅 V₀ = 10 V。</div>
  </section>

  <!-- 右パネル：数値＋共振カーブ -->
  <section class="panel">
    <div class="readouts">
      <div class="readout">
        <div class="k">インピーダンス |Z|</div>
        <div class="v" id="outZ">–</div>
      </div>
      <div class="readout">
        <div class="k">位相角 φ（電圧−電流）</div>
        <div class="v" id="outPhi">–</div>
        <div class="s" id="outPhiNote"></div>
      </div>
    </div>
    <div class="formula" id="zFormula"></div>
    <h2>ω–|Z| グラフ（共振カーブ）</h2>
    <div id="curveWrap"><svg id="curveSvg" viewBox="0 0 460 380" preserveAspectRatio="xMidYMid meet" aria-label="角周波数とインピーダンスの関係"></svg></div>
  </section>
</main>

<script>
"use strict";
/* ================= 複素数ユーティリティ ================= */
const C = {
  add:(a,b)=>[a[0]+b[0], a[1]+b[1]],
  sub:(a,b)=>[a[0]-b[0], a[1]-b[1]],
  mul:(a,b)=>[a[0]*b[0]-a[1]*b[1], a[0]*b[1]+a[1]*b[0]],
  div:(a,b)=>{const d=b[0]*b[0]+b[1]*b[1]; return [(a[0]*b[0]+a[1]*b[1])/d, (a[1]*b[0]-a[0]*b[1])/d];},
  inv:(a)=>{const d=a[0]*a[0]+a[1]*a[1]; return [a[0]/d, -a[1]/d];},
  abs:(a)=>Math.hypot(a[0],a[1]),
  arg:(a)=>Math.atan2(a[1],a[0]),
  rot:(a,th)=>[a[0]*Math.cos(th)-a[1]*Math.sin(th), a[0]*Math.sin(th)+a[1]*Math.cos(th)],
};

/* ================= 回路定義 =================
   series: 直列素子（a–b 間） / par: 並列素子（b–c 間） */
const CIRCUITS = {
  1:{series:"R", par:["C","L"]},
  2:{series:"C", par:["R","L"]},
  3:{series:"L", par:["R","C"]},
};
const V0 = 10; // 電源電圧の振幅 [V]

let cur = 1;

/* ---- 素子インピーダンス ---- */
function elemZ(type, R, L, Cf, w){
  if(type==="R") return [R,0];
  if(type==="L") return [0, w*L];
  return [0, -1/(w*Cf)]; // C
}

/* ---- 回路全体の計算 ---- */
function solve(cirId, R, L, Cf, w){
  // 0 は極限として扱う（発散防止のため、内部計算のみ微小値にクランプ）
  R = Math.max(R, 1e-3); L = Math.max(L, 1e-6); Cf = Math.max(Cf, 1e-12); w = Math.max(w, 1e-3);
  const cir = CIRCUITS[cirId];
  const Zs = elemZ(cir.series, R, L, Cf, w);
  let Y  = C.add(C.inv(elemZ(cir.par[0],R,L,Cf,w)), C.inv(elemZ(cir.par[1],R,L,Cf,w)));
  // 反共振点（Y=0）ちょうどでは NaN になるため、ω をごく僅かにずらして回避
  if(C.abs(Y) < 1e-12 || !Number.isFinite(Y[0]) || !Number.isFinite(Y[1])){
    const w2 = w*(1+1e-7);
    Y = C.add(C.inv(elemZ(cir.par[0],R,L,Cf,w2)), C.inv(elemZ(cir.par[1],R,L,Cf,w2)));
  }
  const Zp = C.inv(Y);
  const Z  = C.add(Zs, Zp);
  const V  = [V0,0];
  const I  = C.div(V,Z);
  const Vab = C.mul(I,Zs);
  const Vbc = C.mul(I,Zp);
  const Ib1 = C.div(Vbc, elemZ(cir.par[0],R,L,Cf,w));
  const Ib2 = C.div(Vbc, elemZ(cir.par[1],R,L,Cf,w));
  return {Z, Zs, Zp, V, I, Vab, Vbc, Ib1, Ib2, cir};
}

/* ---- 特徴的な角周波数 ω0 ---- */
function omega0(cirId, R, L, Cf){
  if(cirId===1){ // R+(C∥L)：反共振 ω₀ = 1/√(LC)
    return {w:1/Math.sqrt(L*Cf), label:"ω₀=1/√(LC)（反共振）"};
  }
  if(cirId===2){ // C+(R∥L)：Im Z = 0 ⇔ ω² = R²/(L(R²C−L))
    const d = R*R*Cf - L;
    return d>0 ? {w:Math.sqrt(R*R/(L*d)), label:"ω₀（φ=0：共振）"} : null;
  }
  // 3: L+(R∥C)：Im Z = 0 ⇔ ω² = 1/(LC) − 1/(R²C²)
  const t = 1/(L*Cf) - 1/(R*R*Cf*Cf);
  return t>0 ? {w:Math.sqrt(t), label:"ω₀（φ=0：共振）"} : null;
}

/* ================= 回路図の描画 ================= */
const NS = "http://www.w3.org/2000/svg";
function el(name, attrs, parent){
  const e = document.createElementNS(NS,name);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function txt(parent, x, y, str, attrs={}){
  const t = el("text", Object.assign({x,y,"font-size":15,fill:"#1a2433","font-weight":"600"},attrs), parent);
  t.textContent = str;
  return t;
}
function wire(p, d){ el("path",{d, fill:"none", stroke:"#1a2433","stroke-width":2,"stroke-linecap":"round"},p); }

function drawElement(p, type, cx, y){
  // 横向き素子（中心 cx, 導線の高さ y）幅 ±26
  if(type==="R"){
    wire(p, `M${cx-26},${y} h6`); wire(p, `M${cx+20},${y} h6`);
    el("rect",{x:cx-20,y:y-9,width:40,height:18,fill:"#fff",stroke:"#1a2433","stroke-width":2},p);
  }else if(type==="C"){
    wire(p, `M${cx-26},${y} h20`); wire(p, `M${cx+6},${y} h20`);
    wire(p, `M${cx-6},${y-13} v26`); wire(p, `M${cx+6},${y-13} v26`);
  }else{ // L
    wire(p, `M${cx-26},${y} h2`);
    let d = `M${cx-24},${y}`;
    for(let i=0;i<4;i++) d += ` a6,7 0 0 1 12,0`;
    wire(p, d);
    wire(p, `M${cx+24},${y} h2`);
  }
  txt(p, cx, y-18, type, {"text-anchor":"middle","font-size":16,"font-style":"italic"});
}

function drawCircuit(cirId){
  const box = document.getElementById("circuitBox");
  box.innerHTML = "";
  const svg = el("svg",{viewBox:"0 0 340 232"});
  box.appendChild(svg);
  const cir = CIRCUITS[cirId];
  const yTop=70, yB1=42, yB2=100, xL=22, xR=318, xN1=140, xN2=252, yBot=200;

  // 導線
  wire(svg, `M${xL},${yTop} H62`);
  drawElement(svg, cir.series, 88, yTop);
  wire(svg, `M114,${yTop} H${xN1}`);
  // 並列部
  wire(svg, `M${xN1},${yB1} V${yB2}`);
  wire(svg, `M${xN2},${yB1} V${yB2}`);
  wire(svg, `M${xN1},${yB1} H${xN1+30}`); drawElement(svg, cir.par[0], (xN1+xN2)/2, yB1); wire(svg, `M${xN2-30},${yB1} H${xN2}`);
  wire(svg, `M${xN1},${yB2} H${xN1+30}`); drawElement(svg, cir.par[1], (xN1+xN2)/2, yB2); wire(svg, `M${xN2-30},${yB2} H${xN2}`);
  wire(svg, `M${xN2},${yTop} H${xR}`);
  // 外周
  wire(svg, `M${xL},${yTop} V${yBot}`);
  wire(svg, `M${xR},${yTop} V${yBot}`);
  wire(svg, `M${xL},${yBot} H156`);
  wire(svg, `M184,${yBot} H${xR}`);
  // 交流電源
  el("circle",{cx:170,cy:yBot,r:14,fill:"#fff",stroke:"#1a2433","stroke-width":2},svg);
  wire(svg, `M161,${yBot} q4.5,-9 9,0 q4.5,9 9,0`);
  txt(svg, 170, yBot-22, "交流電源 V", {"text-anchor":"middle","font-size":12,"fill":"#5b6879"});
  // 節点
  el("circle",{cx:xN1,cy:yTop,r:3.5,fill:"#1a2433"},svg);
  el("circle",{cx:xN2,cy:yTop,r:3.5,fill:"#1a2433"},svg);
  txt(svg, 40, yTop+20, "a", {"font-style":"italic","fill":"#5b6879","font-size":14});
  txt(svg, xN1-4, yTop+22, "b", {"font-style":"italic","fill":"#5b6879","font-size":14});
  txt(svg, xN2+8, yTop+22, "c", {"font-style":"italic","fill":"#5b6879","font-size":14});
  // 電流の向き
  wire(svg, `M${xL},130 l-0.01,0`);
  el("path",{d:`M${xL},138 L${xL},118 M${xL},118 l-5,9 M${xL},118 l5,9`,fill:"none",stroke:"#e03131","stroke-width":2,"stroke-linecap":"round"},svg);
  txt(svg, xL+10, 128, "I", {"font-style":"italic",fill:"#e03131","font-size":15});

  showFormula(cirId);
}

/* ---- インピーダンスの式表示 ---- */
function showFormula(cirId){
  const sq = s => `<span class="sq">√<span class="ov">${s}</span></span>`;
  const fr = (n,d) => `<span class="fr"><span class="nu">${n}</span><span class="de">${d}</span></span>`;
  const num = sq("(ω<i>L</i>)² + <i>R</i>²(1−ω²<i>LC</i>)²"); // 3回路とも分子は共通！
  const dens = {
    1: "|1 − ω²<i>LC</i>|",
    2: "ω<i>C</i> " + sq("<i>R</i>² + (ω<i>L</i>)²"),
    3: sq("1 + (ω<i>RC</i>)²"),
  };
  document.getElementById("zFormula").innerHTML =
    `<span class="fk">インピーダンスの式（回路${"①②③"[cirId-1]}）</span>` +
    `|<i>Z</i>| = ` + fr(num, dens[cirId]);
}

/* ================= ベクトル図の描画 ================= */
function arrow(svg, x0, y0, dx, dy, color, w, label, dash){
  const len = Math.hypot(dx,dy);
  if(len < 1e-9) return;
  const x1 = x0+dx, y1 = y0+dy;
  el("path",{d:`M${x0},${y0} L${x1},${y1}`, stroke:color, "stroke-width":w, fill:"none",
     "stroke-linecap":"round", "stroke-dasharray":dash||"none"}, svg);
  // 矢じり
  const ux=dx/len, uy=dy/len, s=Math.max(9, w*3.2);
  el("path",{d:`M${x1},${y1} L${x1-s*ux+ s*0.45*uy},${y1-s*uy- s*0.45*ux} L${x1-s*ux- s*0.45*uy},${y1-s*uy+ s*0.45*ux} Z`,
     fill:color}, svg);
  if(label){
    const lx = x1 + 14*ux + 12*(uy>=0?1:-1)*0;
    txt(svg, x1+12*ux+8*Math.sign(dx||1), y1+12*uy+5, label,
        {fill:color,"font-size":16,"font-style":"italic","text-anchor": dx>=0?"start":"end"});
  }
}
function dashLine(svg, x0,y0,x1,y1,color){
  el("path",{d:`M${x0},${y0} L${x1},${y1}`, stroke:color, "stroke-width":1.3, fill:"none",
     "stroke-dasharray":"5 4", opacity:0.55}, svg);
}

function drawVectors(sol, iMaxR, vMaxR){
  const svg = document.getElementById("vecSvg");
  svg.innerHTML = "";
  const W=640, H=560, ox=W/2, oy=H/2;

  // 基準：V_bc を +x に回転
  const th = -C.arg(sol.Vbc);
  const Vr   = C.rot(sol.V,  th);
  const Vabr = C.rot(sol.Vab,th);
  const Vbcr = C.rot(sol.Vbc,th);
  const Ir   = C.rot(sol.I,  th);
  const I1r  = C.rot(sol.Ib1,th);
  const I2r  = C.rot(sol.Ib2,th);

  // スケール：ωを全範囲で動かしたときの最大値を基準に固定
  // → スライダー操作でベクトルの長さが実際の大きさに応じて変化する
  const rad = Math.min(W,H)/2 - 55;
  let sV = rad/vMaxR, sI = rad/iMaxR;

  // 同位相で必ず重なるペア（回路①: I と V_ab ／ 回路②③: I_R と V_bc）の
  // 描画長がほぼ等しいときは、縮尺を縮めて長さに差をつけ、両方見えるようにする。
  // スケールバーも同じ縮尺で描くため、図の読み取りは正しいまま。
  const cir = sol.cir;
  {
    const pairI = cir.series==="R" ? sol.I : (cir.par[0]==="R" ? sol.Ib1 : sol.Ib2);
    const pairV = cir.series==="R" ? sol.Vab : sol.Vbc;
    const lenI = C.abs(pairI)*sI, lenV = C.abs(pairV)*sV;
    if(lenI>1e-6 && lenV>1e-6){
      const r = lenI/lenV;
      if(r>0.70 && r<1.43){
        if(r<=1) sI *= 0.70/r;   // 電流側を縮めて 0.70 倍の長さに
        else     sV *= r/1.43;   // 電圧側を縮めて電流が 1.43 倍になるように
      }
    }
  }
  const P = (z,s)=>[ox + z[0]*s, oy - z[1]*s];

  // 目盛グリッド・軸
  for(let g=-3; g<=3; g++){
    if(g===0) continue;
    el("path",{d:`M${ox+g*rad/3},30 V${H-30}`,stroke:"#eef1f6","stroke-width":1},svg);
    el("path",{d:`M30,${oy+g*rad/3} H${W-30}`,stroke:"#eef1f6","stroke-width":1},svg);
  }
  el("path",{d:`M20,${oy} H${W-20}`,stroke:"#c4ccd9","stroke-width":1.5},svg);
  el("path",{d:`M${ox},20 V${H-20}`,stroke:"#c4ccd9","stroke-width":1.5},svg);
  txt(svg, W-24, oy-8, "基準軸", {fill:"#8a94a6","font-size":12,"text-anchor":"end","font-weight":"400"});

  // 位相角 φ の円弧（I → V）
  const aI = C.arg(Ir), aV = C.arg(Vr);
  const phi = aV - aI;
  if(Math.abs(phi) > 0.02){
    const r0 = 52;
    const p0 = [ox + r0*Math.cos(aI), oy - r0*Math.sin(aI)];
    const p1 = [ox + r0*Math.cos(aV), oy - r0*Math.sin(aV)];
    const sweep = phi>0 ? 0 : 1;
    el("path",{d:`M${p0[0]},${p0[1]} A${r0},${r0} 0 0 ${sweep} ${p1[0]},${p1[1]}`,
       stroke:"var(--phi)","stroke-width":2.5, fill:"none"},svg);
    const am = (aI+aV)/2;
    txt(svg, ox + 76*Math.cos(am), oy - 76*Math.sin(am)+5,
        `φ=${(phi*180/Math.PI).toFixed(1)}°`, {fill:"var(--phi)","font-size":15,"text-anchor":"middle"});
  }

  // 合成の破線（平行四辺形）
  const tV=P(Vr,sV), tAB=P(Vabr,sV), tBC=P(Vbcr,sV);
  dashLine(svg, tAB[0],tAB[1], tV[0],tV[1], "var(--vBC)");
  dashLine(svg, tBC[0],tBC[1], tV[0],tV[1], "var(--vAB)");
  const tI=P(Ir,sI), t1=P(I1r,sI), t2=P(I2r,sI);
  dashLine(svg, t1[0],t1[1], tI[0],tI[1], "var(--iB)");
  dashLine(svg, t2[0],t2[1], tI[0],tI[1], "var(--iA)");

  // 電流ベクトル
  arrow(svg, ox,oy, t1[0]-ox, t1[1]-oy, "var(--iA)", 3, "I"+sub(cir.par[0]));
  arrow(svg, ox,oy, t2[0]-ox, t2[1]-oy, "var(--iB)", 3, "I"+sub(cir.par[1]));
  arrow(svg, ox,oy, tI[0]-ox, tI[1]-oy, "var(--iT)", 4.5, "I");

  // 電圧ベクトル
  arrow(svg, ox,oy, tBC[0]-ox, tBC[1]-oy, "var(--vBC)", 3, "Vbc");
  arrow(svg, ox,oy, tAB[0]-ox, tAB[1]-oy, "var(--vAB)", 3, "Vab");
  arrow(svg, ox,oy, tV[0]-ox, tV[1]-oy, "var(--vV)", 4.5, "V");

  el("circle",{cx:ox,cy:oy,r:4,fill:"#1a2433"},svg);

  // スケールバー（左下）：この長さが何 V / 何 A に相当するか
  const uV = niceBarUnit(90/sV), uI = niceBarUnit(90/sI);
  const bx=36, by1=H-46, by2=H-24;
  el("path",{d:`M${bx},${by1} h${uV*sV}`,stroke:"var(--vV)","stroke-width":4,"stroke-linecap":"butt"},svg);
  el("path",{d:`M${bx},${by1-5} v10 M${bx+uV*sV},${by1-5} v10`,stroke:"var(--vV)","stroke-width":1.5},svg);
  txt(svg, bx+uV*sV+8, by1+5, fmtNum(uV)+" V", {fill:"var(--vV)","font-size":13});
  el("path",{d:`M${bx},${by2} h${uI*sI}`,stroke:"var(--iT)","stroke-width":4,"stroke-linecap":"butt"},svg);
  el("path",{d:`M${bx},${by2-5} v10 M${bx+uI*sI},${by2-5} v10`,stroke:"var(--iT)","stroke-width":1.5},svg);
  txt(svg, bx+uI*sI+8, by2+5, fmtNum(uI)+" A", {fill:"var(--iT)","font-size":13});

  // 凡例
  const lg = document.getElementById("legend");
  const f = (z,u)=>{ const m=C.abs(z); return (m<1e-6 ? "≈ 0" : m.toPrecision(3))+" "+u; };
  lg.innerHTML = [
    chip("var(--vV)",  "V（電源）",  f(sol.V,"V")),
    chip("var(--vAB)", "V_ab（直列 "+cir.series+"）", f(sol.Vab,"V")),
    chip("var(--vBC)", "V_bc（並列部）", f(sol.Vbc,"V")),
    chip("var(--iT)",  "I（全体）", f(sol.I,"A")),
    chip("var(--iA)",  "I_"+cir.par[0], f(sol.Ib1,"A")),
    chip("var(--iB)",  "I_"+cir.par[1], f(sol.Ib2,"A")),
  ].join("");
  return phi;
}
function sub(s){ return s; }
function niceBarUnit(t){
  // t 以下で最大の「切りの良い値」（1, 2, 5 ×10^n）を返す
  if(!(t>0)) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(t)));
  const m = t/p;
  const n = m>=5 ? 5 : m>=2 ? 2 : 1;
  return n*p;
}
function chip(color, name, val){
  return `<div class="chip"><span class="sw" style="background:${color}"></span><span>${name} = <b>${val}</b></span></div>`;
}

/* ================= ω–|Z| カーブ ================= */
function drawCurve(cirId, R, L, Cf, w, Zcur){
  const svg = document.getElementById("curveSvg");
  svg.innerHTML = "";
  const W=460, H=380, mL=56, mR=14, mT=14, mB=42;
  const pw = W-mL-mR, ph = H-mT-mB;
  const wMin=0, wMax=5000, N=420;

  // サンプリング
  const vals=[];
  for(let i=0;i<=N;i++){
    const om = wMin + (wMax-wMin)*i/N;
    vals.push([om, C.abs(solve(cirId,R,L,Cf,om).Z)]);
  }
  // y 上限：外れ値（反共振の発散）をクリップ
  const sorted = vals.map(v=>v[1]).filter(Number.isFinite).sort((a,b)=>a-b);
  const p90 = sorted[Math.floor(sorted.length*0.90)];
  let yTop = Math.min(sorted[sorted.length-1], p90*3);
  yTop = niceCeil(yTop);
  if(!Number.isFinite(Zcur)) Zcur = yTop*2; // 反共振点では上端にクリップ

  const X = om => mL + pw*(om-wMin)/(wMax-wMin);
  const Y = z  => mT + ph*(1 - Math.min(z,yTop)/yTop);

  // 軸・目盛
  el("rect",{x:mL,y:mT,width:pw,height:ph,fill:"#fff",stroke:"#dde3ec"},svg);
  for(let i=0;i<=4;i++){
    const z = yTop*i/4, y = Y(z);
    el("path",{d:`M${mL},${y} H${mL+pw}`,stroke:"#eef1f6"},svg);
    txt(svg, mL-6, y+4, fmtNum(z), {"text-anchor":"end","font-size":11,fill:"#5b6879","font-weight":"400"});
  }
  for(const om of [0,1000,2000,3000,4000,5000]){
    txt(svg, X(om), H-mB+16, om.toString(), {"text-anchor":"middle","font-size":11,fill:"#5b6879","font-weight":"400"});
    if(om>0) el("path",{d:`M${X(om)},${mT} V${mT+ph}`,stroke:"#eef1f6"},svg);
  }
  txt(svg, mL+pw/2, H-8, "角周波数 ω [rad/s]", {"text-anchor":"middle","font-size":12,fill:"#5b6879"});
  txt(svg, 14, mT+10, "|Z| [Ω]", {"font-size":12,fill:"#5b6879"});

  // ω0 縦線
  const w0 = omega0(cirId,R,L,Cf);
  if(w0 && w0.w>=wMin && w0.w<=wMax){
    el("path",{d:`M${X(w0.w)},${mT} V${mT+ph}`,stroke:"var(--w0)","stroke-width":1.6,"stroke-dasharray":"6 4"},svg);
    txt(svg, Math.min(X(w0.w)+4, W-120), mT+14, w0.label, {fill:"var(--w0)","font-size":11,"font-weight":"600"});
    txt(svg, X(w0.w), H-mB+30, "ω₀="+fmtNum(w0.w), {"text-anchor":"middle","font-size":11,fill:"var(--w0)"});
  }
  // 1/√(LC) の縦線（回路②③では φ=0 の ω₀ と異なる位置になる）
  const wLC = 1/Math.sqrt(L*Cf);
  if(cirId!==1 && wLC>=wMin && wLC<=wMax){
    el("path",{d:`M${X(wLC)},${mT} V${mT+ph}`,stroke:"#d4a017","stroke-width":1.6,"stroke-dasharray":"2 4"},svg);
    txt(svg, Math.min(X(wLC)+4, W-90), mT+30, "1/√(LC)", {fill:"#b8860b","font-size":11,"font-weight":"600"});
    txt(svg, X(wLC), mT+ph-6, fmtNum(wLC), {"text-anchor":"middle","font-size":11,fill:"#b8860b"});
  }

  // カーブ
  let d="";
  vals.forEach(([om,z],i)=>{ d += (i? " L":"M")+X(om)+","+Y(z); });
  el("path",{d, fill:"none", stroke:"#1864ab","stroke-width":2.5, "stroke-linejoin":"round"},svg);

  // 現在の ω マーカー
  el("path",{d:`M${X(w)},${mT} V${mT+ph}`,stroke:"var(--mark)","stroke-width":1.4, opacity:0.7},svg);
  el("circle",{cx:X(w), cy:Y(Zcur), r:5.5, fill:"var(--mark)", stroke:"#fff","stroke-width":2},svg);
  if(Zcur>yTop) txt(svg, X(w), mT+12, "▲", {fill:"var(--mark)","text-anchor":"middle","font-size":11});
}
function niceCeil(v){
  if(!(v>0)) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  const m = v/p;
  const n = m<=1?1 : m<=2?2 : m<=2.5?2.5 : m<=5?5 : 10;
  return n*p;
}
function fmtNum(v){
  if(!Number.isFinite(v)) return "∞";
  if(v>=1e9) return (v/1e9).toPrecision(3)+"G";
  if(v>=1e6) return (v/1e6).toPrecision(3)+"M";
  if(v>=10000) return (v/1000).toPrecision(3)+"k";
  if(v>=100) return Math.round(v).toString();
  return v.toPrecision(3);
}
function fmtOhm(v){
  return (!Number.isFinite(v) || v>1e12) ? "∞（開放）" : fmtNum(v)+" Ω";
}

/* ================= 更新処理 ================= */
const $ = id => document.getElementById(id);
function update(){
  const R = +$("sR").value;
  const L = +$("sL").value;
  const Cf = +$("sC").value * 1e-6;
  const w = +$("sW").value;

  $("valR").textContent = R+" Ω";
  $("valL").textContent = L.toFixed(2)+" H";
  $("valC").textContent = $("sC").value+" μF";
  $("valW").textContent = w+" rad/s";
  $("valXL").textContent = fmtOhm(w*L);
  $("valXC").textContent = fmtOhm(1/(w*Cf));
  $("valW0").textContent = (L===0 || Cf===0) ? "—（L または C が 0）" : fmtNum(1/Math.sqrt(L*Cf))+" rad/s";

  const sol = solve(cur, R, L, Cf, w);

  // ω全範囲での電流・電圧の最大値（ベクトル長の固定スケール基準）
  let iMaxR = 1e-12, vMaxR = 1e-12;
  for(let i=0;i<=200;i++){
    const om = 5000*i/200;
    const s2 = solve(cur,R,L,Cf,om);
    for(const z of [s2.I,s2.Ib1,s2.Ib2]){const m=C.abs(z); if(Number.isFinite(m)) iMaxR=Math.max(iMaxR,m);}
    for(const z of [s2.V,s2.Vab,s2.Vbc]){const m=C.abs(z); if(Number.isFinite(m)) vMaxR=Math.max(vMaxR,m);}
  }
  // 現在値がサンプリングの隙間で最大を超える場合に備える
  for(const z of [sol.I,sol.Ib1,sol.Ib2]){const m=C.abs(z); if(Number.isFinite(m)) iMaxR=Math.max(iMaxR,m);}
  for(const z of [sol.V,sol.Vab,sol.Vbc]){const m=C.abs(z); if(Number.isFinite(m)) vMaxR=Math.max(vMaxR,m);}
  // スケール基準の下限：全範囲で電流が微小（C=0 等で回路が事実上開放）のときは
  // 拡大表示せず、I≈0 が「長さ≈0 の矢印」として見えるようにする
  iMaxR = Math.max(iMaxR, V0/500);

  const phi = drawVectors(sol, iMaxR, vMaxR);
  const Zabs = C.abs(sol.Z);
  $("outZ").textContent = (!Number.isFinite(Zabs) || Zabs>1e6) ? "→ ∞（反共振）" : fmtNum(Zabs)+" Ω";
  const deg = phi*180/Math.PI;
  $("outPhi").textContent = (deg>=0?"+":"")+deg.toFixed(1)+"°";
  $("outPhiNote").textContent =
    Math.abs(deg)<0.5 ? "電圧と電流は同位相" :
    deg>0 ? "電圧が電流より進んでいる（誘導性）" : "電圧が電流より遅れている（容量性）";
  drawCurve(cur, R, L, Cf, w, Zabs);
}

function selectCircuit(id){
  cur = id;
  for(const k of [1,2,3]){
    $("tab"+k).classList.toggle("active", k===id);
    $("tab"+k).setAttribute("aria-selected", k===id ? "true":"false");
  }
  drawCircuit(id);
  update();
}
for(const k of [1,2,3]) $("tab"+k).addEventListener("click", ()=>selectCircuit(k));
for(const id of ["sR","sL","sC","sW"]) $(id).addEventListener("input", update);

drawCircuit(1);
update();
</script>
